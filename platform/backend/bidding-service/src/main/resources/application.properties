spring.application.name=bidding-service
server.port=8083

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/rostra_bidding
spring.datasource.username=rostra
spring.datasource.password=rostra_dev_pw
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT ? same secret as auth and auction services
app.jwt.secret=lSr+b8Q69GkkZWtPaUfIPmaxMaOJhy3V8SqD93Y/+nY=

# Kafka producer (for outbox poller, later)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true

# Topic names
app.kafka.topics.bid-placed=bid.placed

# Auction service URL (for sync validation call)
app.services.auction.base-url=http://localhost:8082

# Resilience4J circuit breaker config (we'll wire it later)
resilience4j.circuitbreaker.instances.auctionService.sliding-window-size=10
resilience4j.circuitbreaker.instances.auctionService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auctionService.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.auctionService.permitted-number-of-calls-in-half-open-state=3

# Enable scheduling for outbox poller
spring.task.scheduling.pool.size=2

# Enable retry
spring.aop.proxy-target-class=true
