spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/auth/**
            - id: auction-service
              uri: http://localhost:8082
              predicates:
                - Path=/auctions/**
            - id: bidding-service
              uri: http://localhost:8083
              predicates:
                - Path=/bids/**
            - id: notification-service
              uri: http://localhost:8084
              predicates:
                - Path=/me/notifications/**
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:3000"
                  - "http://localhost:5173"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, gateway

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty.http.client: INFO